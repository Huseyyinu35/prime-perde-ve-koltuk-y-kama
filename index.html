<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prestij Halı & Koltuk Yıkama</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f7faf4;
      color:#172012;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:#172012;
    }

    header{
      position:fixed;
      top:0;
      width:100%;
      z-index:999;
      background:rgba(255,255,255,0.94);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(126,170,65,0.18);
      box-shadow:0 8px 24px rgba(18,33,12,0.08);
    }

    .navbar{
      width:90%;
      margin:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 0;
    }

    .logo{
      display:flex;
      align-items:center;
    }

    .logo img{
      width:auto;
      height:58px;
      display:block;
    }

    .menu{
      display:flex;
      gap:28px;
    }

    .menu a{
      transition:0.3s;
      font-size:15px;
      font-weight:500;
    }

    .menu a:hover{
      color:#8ddf2f;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:120px 20px;
      background:
      linear-gradient(rgba(0,0,0,0.68),rgba(0,0,0,0.68)),
      url('https://images.pexels.com/photos/14675105/pexels-photo-14675105.jpeg?auto=compress&cs=tinysrgb&w=2070') center/cover;
    }

    .hero-content{
      max-width:900px;
    }

    .hero h1{
      font-size:68px;
      line-height:1.1;
      margin-bottom:25px;
      color:white;
    }
